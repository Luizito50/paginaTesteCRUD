<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="/styles/admin.css">
</head>
<body class="principal">
    <div class="admin-container">
        <h1 style="color: white;">Gerenciamento de Usuários</h1>
        <div style="margin-bottom: 20px;">
            <button onclick="buscarUsuarios()" class="submit" style="padding: 10px;">Atualizar Lista</button>
            <a href="/" style="color: white; margin-left: 20px;">Voltar ao Login</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Número</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        
        async function buscarUsuarios() {
            const response = await fetch('/usuarios');
            const usuarios = await response.json();
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';

            usuarios.forEach(u => {
                corpo.innerHTML += `
            <tr>
                <td>${u.id}</td>
                <td>${u.email}</td>
                <td>${u.numero}</td>
                <td>${u.nome}</td>
                <td>
                    <button class="btn-edit" onclick="editarUsuario(${u.id}, '${u.email}')">Editar</button>
                    <button class="btn-del" onclick="deletarUsuario(${u.id})">Deletar</button>
                </td>
            </tr>`;
            });
        }

        async function deletarUsuario(id) {
            if (confirm('Tem certeza disso?')) {
                await fetch(`/usuarios/${id}`, { method: 'DELETE' });
                buscarUsuarios();
            }
        }

        async function editarUsuario(id, emailAntigo, numeroAntigo) {
          const novoEmail = prompt("Novo email:", emailAntigo);
            const novoNumero = prompt("Novo número:", numeroAntigo);
            if (novoEmail) {
                await fetch(`/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: novoEmail, numero: novoNumero })
                });
                buscarUsuarios();
            }
            console.log("DADOS ATUALIZADOS:", novoEmail, novoNumero);
        }
        window.onload = buscarUsuarios;
    </script>
</body>

</html>
